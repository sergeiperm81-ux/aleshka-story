<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Возвращение Волшебной книги</title>
<style>
/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:      #1e1433;
  --gold:     #c9a227;
  --gold-lt:  #f0d060;
  --parchm:   #fdf8f0;
  --parchm2:  #f5ede0;
  --brown:    #2d1e0e;
  --brown2:   #7b4f2e;
  --magic:    #6b35c9;
  --magic2:   #9b6bef;
  --teal:     #1e8a7a;
  --shadow:   rgba(0,0,0,.18);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: #0d0a1e;
  font-family: Georgia, 'Times New Roman', serif;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 40%, #1a0a3e 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 60%, #0a1a40 0%, transparent 60%),
    #0d0a1e;
  z-index: -1;
}

/* ══════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════ */
#app {
  width: 100%;
  max-width: 960px;
  height: 100vh;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  background: var(--parchm);
  box-shadow: 0 0 80px rgba(100,60,200,.35);
  position: relative;
  overflow: hidden;
}

/* ── progress bar ── */
#topBar {
  background: var(--ink);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  flex-shrink: 0;
  z-index: 10;
}
.prog-label {
  color: rgba(201,162,39,.6);
  font-size: 12px;
  font-family: Arial, sans-serif;
  white-space: nowrap;
  min-width: 40px;
}
.prog-track {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,.12);
  border-radius: 2px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--magic), var(--gold));
  border-radius: 2px;
  transition: width .4s ease;
}
.prog-chaps {
  display: flex;
  gap: 3px;
  flex: 1;
}
.prog-dot {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,.12);
  transition: background .3s;
}
.prog-dot.vis  { background: rgba(201,162,39,.75); }
.prog-dot.cur  { background: var(--gold); }

/* ── screens wrapper ── */
#screens {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.screen {
  display: none;
  position: absolute;
  inset: 0;
}
.screen.active {
  display: flex;
  flex-direction: column;
  animation: slideRight .32s ease-out both;
}
.screen.active.back {
  animation: slideLeft .32s ease-out both;
}

@keyframes slideRight {
  from { transform: translateX(100%); }
  to   { transform: translateX(0); }
}
@keyframes slideLeft {
  from { transform: translateX(-100%); }
  to   { transform: translateX(0); }
}

/* ── two-pane layout (desktop) ── */
.pane-wrap {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}
.pane-illus {
  width: 42%;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.pane-illus img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.illus-ph {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 13px;
  font-family: Arial, sans-serif;
  color: rgba(255,255,255,.55);
  text-align: center;
  padding: 20px;
}
.illus-ph .ph-icon { font-size: 36px; opacity: .6; }

/* Scene illustration container */
.illus-scene {
  width: 100%; height: 100%;
  position: relative;
  overflow: hidden;
}

/* Scene caption overlay */
.scene-caption {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg, rgba(0,0,0,.55), transparent);
  color: rgba(255,255,255,.65);
  font-size: 11px;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 18px 12px 8px;
  pointer-events: none;
  letter-spacing: .5px;
}

.pane-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--parchm);
  border-left: 1px solid rgba(0,0,0,.07);
}
.scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 28px 28px 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--gold) transparent;
}
.scroll-area::-webkit-scrollbar { width: 5px; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

/* ── Story text ── */
.story-text {
  font-size: 20px;
  line-height: 1.9;
  color: var(--brown);
}
.story-text p { margin-bottom: 16px; }
.story-text p:last-child { margin-bottom: 0; }
.dialog { font-style: italic; color: var(--brown2); }

/* Chapter header inside scroll area */
.chapter-head {
  font-size: 11px;
  font-family: Arial, sans-serif;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(107,53,201,.5);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.chapter-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(107,53,201,.15);
}

/* ── fixed nav bar ── */
.nav-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: var(--parchm2);
  border-top: 1px solid rgba(0,0,0,.08);
  flex-shrink: 0;
}
.btn {
  border: none;
  border-radius: 26px;
  padding: 13px 22px;
  font-size: 16px;
  font-family: Georgia, serif;
  cursor: pointer;
  transition: transform .1s, box-shadow .2s, opacity .2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.btn:active { transform: scale(.95); }
.btn-main {
  background: var(--ink);
  color: var(--gold-lt);
  flex: 1;
  font-size: 17px;
  box-shadow: 0 3px 12px var(--shadow);
}
.btn-main:hover { box-shadow: 0 4px 18px rgba(107,53,201,.4); }
.btn-back {
  background: #e8dcc8;
  color: var(--brown);
}
.btn-toc {
  background: transparent;
  color: var(--ink);
  border: 2px solid var(--ink);
  padding: 11px 14px;
  font-size: 18px;
}
.btn:disabled { opacity: .3; pointer-events: none; }

/* ══════════════════════════════════════════
   COVER SCREEN
══════════════════════════════════════════ */
#sc0 {
  background: radial-gradient(ellipse 120% 100% at 30% 60%, #2a1060 0%, #0d0a1e 70%);
}
.cover-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px 36px;
  background: transparent;
}
.cover-title {
  font-size: clamp(22px, 3.8vw, 32px);
  font-weight: bold;
  color: var(--gold-lt);
  line-height: 1.3;
  margin-bottom: 10px;
  text-shadow: 0 0 30px rgba(201,162,39,.5);
}
.cover-line {
  width: 80px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 14px auto;
}
.cover-sub {
  font-size: 14px;
  color: rgba(201,162,39,.5);
  margin-bottom: 36px;
  font-family: Arial, sans-serif;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.cover-tagline {
  font-size: 12px;
  color: rgba(201,162,39,.35);
  font-family: Arial, sans-serif;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 22px;
}
.btn-start {
  background: linear-gradient(135deg, var(--gold) 0%, #e8b830 100%);
  color: var(--ink);
  border: none;
  border-radius: 32px;
  padding: 18px 52px;
  font-size: 20px;
  font-weight: bold;
  font-family: Georgia, serif;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(201,162,39,.45);
  transition: transform .15s, box-shadow .2s;
  letter-spacing: .5px;
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,162,39,.55); }
.btn-start:active { transform: scale(.97); }

/* ══════════════════════════════════════════
   BACKSTORY SLIDES
══════════════════════════════════════════ */
.bslide { display: none; }
.bslide.active { display: block; }
.bs-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(0,0,0,.08);
}
.bs-badge {
  background: linear-gradient(135deg, var(--magic), var(--magic2));
  color: #fff;
  font-size: 11px;
  font-family: Arial, sans-serif;
  padding: 4px 10px;
  border-radius: 12px;
  white-space: nowrap;
}
.bs-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 18px;
}
.bdot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #e0d4c0;
  cursor: pointer;
  transition: background .2s, transform .2s;
}
.bdot.active { background: var(--ink); transform: scale(1.2); }

/* ══════════════════════════════════════════
   BOOKSHELF GAME — book covers with horizontal titles
══════════════════════════════════════════ */
.game-intro {
  font-size: 16px;
  font-style: italic;
  color: var(--brown2);
  line-height: 1.7;
  margin-bottom: 12px;
  padding: 12px 16px;
  background: rgba(107,53,201,.07);
  border-left: 3px solid var(--magic2);
  border-radius: 0 8px 8px 0;
}
.magic-bar-wrap { margin-bottom: 8px; }
.magic-bar-label {
  font-size: 13px;
  font-family: Arial, sans-serif;
  color: var(--brown);
  margin-bottom: 5px;
  display: flex;
  justify-content: space-between;
}
.magic-bar {
  height: 14px;
  background: #e8dcc8;
  border-radius: 7px;
  overflow: hidden;
}
.magic-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--magic), var(--gold));
  border-radius: 7px;
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
.magic-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 60%, rgba(255,255,255,.3) 80%, transparent 100%);
  animation: shimmer 1.5s ease-in-out infinite;
}
@keyframes shimmer {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(200%); }
}
.book-feed {
  min-height: 26px;
  text-align: center;
  font-size: 15px;
  font-style: italic;
  color: var(--brown2);
  margin: 5px 0 6px;
  font-family: Arial, sans-serif;
}

/* Book cover grid */
.shelf-cabinet {
  background: linear-gradient(180deg, #2a1205 0%, #4a2010 100%);
  border-radius: 12px;
  padding: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,.45), inset 0 2px 0 rgba(255,200,100,.05);
}
.shelf-plank {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.shelf-plank:last-child { margin-bottom: 0; }
/* wooden shelf line between rows */
.shelf-divider {
  height: 6px;
  background: linear-gradient(180deg, #8a4818, #5a2e0c);
  border-radius: 3px;
  margin: 2px 0 10px;
  box-shadow: 0 2px 4px rgba(0,0,0,.4);
}
.book-cover {
  flex: 1;
  border-radius: 7px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 6px 8px;
  min-height: 100px;
  text-align: center;
  user-select: none;
  transition: transform .2s, box-shadow .2s;
  box-shadow: 2px 3px 8px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.1);
  position: relative;
  overflow: hidden;
}
.book-cover:not(.found):hover {
  transform: translateY(-6px) scale(1.04);
  box-shadow: 2px 12px 20px rgba(0,0,0,.6);
}
.book-cover.found {
  box-shadow: 0 0 0 2px var(--gold), 0 0 20px rgba(240,208,96,.6);
  cursor: default;
}
.book-cover.found::after {
  content: '✨';
  position: absolute;
  top: 4px; right: 5px;
  font-size: 12px;
}
.book-cover.wrong { animation: shk .35s; }
@keyframes shk {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-5px) rotate(-2deg); }
  75%      { transform: translateX(5px) rotate(2deg); }
}
.book-icon { font-size: 22px; margin-bottom: 5px; }
.book-title {
  font-size: 11px;
  color: rgba(255,255,255,.95);
  font-family: Arial, sans-serif;
  line-height: 1.3;
  font-weight: 600;
  word-break: break-word;
}

/* ══════════════════════════════════════════
   MEAL CHOICE
══════════════════════════════════════════ */
.meal-q {
  font-size: 17px;
  font-weight: bold;
  color: var(--ink);
  margin-bottom: 14px;
}
.meal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.meal-card {
  border: 3px solid #e0d4c0;
  border-radius: 18px;
  padding: 18px 12px;
  text-align: center;
  cursor: pointer;
  background: #fff;
  transition: border-color .2s, transform .15s, box-shadow .2s;
}
.meal-card:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 6px 20px var(--shadow); }
.meal-card.chosen { border-color: var(--ink); background: #f0eef8; box-shadow: 0 4px 16px rgba(30,20,51,.15); }
.meal-emoji { font-size: 46px; display: block; margin-bottom: 10px; }
.meal-name { font-size: 15px; font-weight: bold; color: var(--ink); margin-bottom: 4px; line-height: 1.3; }
.meal-hint { font-size: 12px; color: #888; font-family: Arial, sans-serif; }
.meal-result {
  min-height: 26px;
  font-size: 15px;
  font-style: italic;
  color: var(--brown2);
  line-height: 1.6;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* ══════════════════════════════════════════
   END SCREEN
══════════════════════════════════════════ */
.end-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 36px 32px;
  background: linear-gradient(160deg, #1a0a3e 0%, #0d0a1e 100%);
  position: relative;
  overflow: hidden;
}
.end-stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.end-star {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--gold-lt);
  border-radius: 50%;
  opacity: .5;
  animation: twinkle var(--d) ease-in-out infinite var(--dl);
}
@keyframes twinkle {
  0%,100% { opacity: .15; }
  50%      { opacity: .7; }
}
.end-icon  { font-size: 58px; margin-bottom: 16px; filter: drop-shadow(0 0 20px var(--gold)); }
.end-title { font-size: 26px; color: var(--gold-lt); font-weight: bold; margin-bottom: 12px; }
.end-hint  { font-size: 17px; color: rgba(255,255,255,.75); line-height: 1.7; margin-bottom: 30px; max-width: 400px; }
.btn-restart {
  background: linear-gradient(135deg, var(--gold) 0%, #e8b830 100%);
  color: var(--ink);
  border: none;
  border-radius: 28px;
  padding: 16px 42px;
  font-size: 18px;
  font-weight: bold;
  font-family: Georgia, serif;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(201,162,39,.4);
}

/* ══════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════ */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
@keyframes floatSlow {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-6px) rotate(3deg); }
}
@keyframes pulse {
  0%,100% { transform: scale(1);   opacity: .7; }
  50%      { transform: scale(1.1); opacity: .3; }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ══════════════════════════════════════════
   MOBILE — stack layout
══════════════════════════════════════════ */
@media (max-width: 639px) {
  .pane-illus { width: 100%; height: 200px; flex-shrink: 0; }
  .pane-wrap { flex-direction: column; }
  .scroll-area { padding: 18px 18px 10px; }
  .story-text { font-size: 18px; }
}

/* ══════════════════════════════════════════
   TOC OVERLAY
══════════════════════════════════════════ */
#toc {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 500;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(3px);
}
#toc.open { display: flex; }
.toc-box {
  background: var(--parchm);
  width: 92%;
  max-width: 400px;
  max-height: 80vh;
  border-radius: 20px;
  padding: 24px;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.toc-title { font-size: 20px; font-weight: bold; color: var(--ink); margin-bottom: 16px; }
.toc-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
  color: var(--brown);
  transition: background .15s;
}
.toc-row:hover { background: #f0e8d8; }
.toc-row.cur   { background: var(--ink); color: var(--gold-lt); }
.toc-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: #e8dcc8;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: bold;
  flex-shrink: 0;
}
.toc-row.cur .toc-num { background: var(--gold); color: var(--ink); }
.toc-close {
  width: 100%; margin-top: 14px;
  background: #e8dcc8; color: var(--brown);
  border: none; border-radius: 24px;
  padding: 12px; font-size: 15px;
  font-family: Georgia, serif; cursor: pointer;
}

/* ── full-width screens ── */
.full-screen-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
</style>
</head>
<body>
<div id="app">
  <div id="topBar">
    <span class="prog-label" id="progLabel">1/14</span>
    <div class="prog-chaps" id="progDots"></div>
  </div>
  <div id="screens"></div>
</div>

<div id="toc">
  <div class="toc-box">
    <div class="toc-title">📖 Оглавление</div>
    <div id="tocList"></div>
    <button class="toc-close" onclick="tocClose()">Закрыть</button>
  </div>
</div>

<script>
// ────────────────────────────────────────────
// DATA
// ────────────────────────────────────────────
const SCREENS = [
  { id:'cover',     type:'cover',     toc:'Обложка' },
  {
    id:'intro', type:'story', toc:'Начало истории',
    illus:{ bg:'linear-gradient(160deg,#1e5a3a,#0d3020)', ph:'🌿', label:'Волшебная книга' },
    text:`<p>Говорят, что попасть в сказку — это сложно!</p>
          <p>На самом деле, это не так! Порой достаточно просто свернуть с привычного пути, чтобы оказаться в самой настоящей сказке. А иногда сказка приходит к нам сама — просто мы не всегда обращаем на это внимание. Хорошо, что у нашего героя получилось!</p>
          <p>Впрочем, давайте обо всём по порядку.</p>`
  },
  {
    id:'home', type:'story', toc:'Алёшка дома',
    illus:{ img:'3e51266e-72de-4602-acee-ad76597d4c76.jfif', bg:'linear-gradient(160deg,#7a3a1a,#3d1e0a)', ph:'🏠', label:'Алёшка в своей комнате' },
    text:`<p>Наша история началась обычным пятничным вечером: родители Алёшки как обычно уехали в театр, и он на весь вечер остался за главного в доме.</p>
          <p>Сначала он выпил чаю с шоколадной пастой, потом стащил две конфеты из серванта, который вроде бы и был закрыт на ключ, но Алёшка давно научился открывать его отвёрткой из набора «Юный инженер».</p>
          <p>А потом он сел было за планшет, чтобы поиграть в любимую игру, как вдруг услышал тихий плач.</p>`
  },
  {
    id:'wardrobe', type:'story', toc:'Странный шкаф',
    illus:{ bg:'linear-gradient(160deg,#1a2a5a,#0d1530)', ph:'🚪', label:'Алёшка открывает шкаф' },
    text:`<p>«Показалось!» — подумал Алёшка. Но только он уселся поудобнее, как снова услышал тихие всхлипывания, которые доносились из большого одёжного шкафа.</p>

// ────────────────────────────────────────────
// RENDER
// ────────────────────────────────────────────
function render() {
  renderTop();
  renderScreens();
}

function renderTop() {
  var n = SCREENS.length;
  document.getElementById('progLabel').textContent = (S.cur+1)+'/'+n;
  document.getElementById('progDots').innerHTML = SCREENS.map(function(_,i) {
    var c = 'prog-dot';
    if (i === S.cur) c += ' cur';
    else if (S.visited.has(i)) c += ' vis';
    return '<div class="'+c+'"></div>';
  }).join('');
}

function renderScreens() {
  var dir = S.cur > S.prev ? '' : ' back';
  document.getElementById('screens').innerHTML =
    SCREENS.map(function(sc, i) {
      var cls = 'screen' + (i===S.cur ? (' active'+dir) : '');
      return '<div class="'+cls+'" id="sc'+i+'">'+build(sc,i)+'</div>';
    }).join('');
}

// ── builders ────────────────────────────────
function build(sc, i) {
  switch(sc.type) {
    case 'cover':     return buildCover();
    case 'story':     return buildStory(sc,i);
    case 'backstory': return buildBackstory(sc,i);
    case 'bookshelf': return buildBookshelf(i);
    case 'meal':      return buildMeal(i);
    case 'portal':    return buildPortal(i);
    case 'end':       return buildEnd();
  }
  return '';
}

// illusPane(sc) kept as alias — callers pass index directly now

function navBar(i, fwdDisabled) {
  var back = i > 0
    ? '<button class="btn btn-back" onclick="go('+i+'-1)">← Назад</button>' : '';
  var fwd = i < SCREENS.length-1
    ? '<button class="btn btn-main" onclick="go('+(i+1)+')" '+(fwdDisabled?'disabled':'')+'>Дальше&nbsp;→</button>' : '';
  return '<div class="nav-bar">'+back+fwd+'<button class="btn btn-toc" onclick="tocOpen()">☰</button></div>';
}

function buildCover() {
  // cover uses IMG1 (odd index 1 logic)
  return '<div class="pane-wrap" style="background:radial-gradient(ellipse at 30% 60%,#2a1060,#0d0a1e);">'
    + illusPane(1)
    + '<div class="pane-text" style="background:transparent;border-left:1px solid rgba(201,162,39,.18);">'
    + '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 36px;">'
    + '<div style="color:rgba(201,162,39,.45);font-size:11px;letter-spacing:3px;font-family:Arial,sans-serif;text-transform:uppercase;margin-bottom:22px;">✦ интерактивная сказка ✦</div>'
    + '<div class="cover-title">Возвращение<br>Волшебной книги</div>'
    + '<div class="cover-line"></div>'
    + '<div class="cover-sub">Глава первая</div>'
    + '<button class="btn-start" onclick="go(1)">Читать&nbsp;→</button>'
    + '<div style="margin-top:20px;color:rgba(201,162,39,.3);font-size:11px;font-family:Arial,sans-serif;letter-spacing:1px;">для детей 6–7 лет</div>'
    + '</div>'
    + '</div>'
    + '</div>';
}

function buildStory(sc, i) {
  var head = '<div class="chapter-head">Глава&nbsp;I&nbsp;·&nbsp;'+sc.toc+'</div>';
  return '<div class="pane-wrap">'
    + illusPane(i)
    + '<div class="pane-text">'
    + '<div class="scroll-area"><div class="story-text">'+head+sc.text+'</div></div>'
    + navBar(i)
    + '</div>'
    + '</div>';
}

function buildBackstory(sc, i) {
  var n   = sc.slides.length;
  var cur = Math.min(S.bsSlide, n-1);
  var isLast = cur === n-1;
  var slidesHTML = sc.slides.map(function(s,j) {
    return '<div class="bslide'+(j===cur?' active':'')+'">'+s+'</div>';
  }).join('');
  var dotsHTML = sc.slides.map(function(_,j) {
    return '<div class="bdot'+(j===cur?' active':'')+'" onclick="bsGo('+j+')"></div>';
  }).join('');
  return '<div class="pane-wrap">'
    + illusPane(i)
    + '<div class="pane-text">'
    + '<div class="scroll-area">'
    + '<div class="bs-header">'
    + '<span class="bs-badge">История Волшебной страны</span>'
    + '<span style="font-size:13px;color:#888;font-family:Arial,sans-serif;">'+(cur+1)+'&nbsp;/&nbsp;'+n+'</span>'
    + '</div>'
    + '<div class="story-text">'+slidesHTML+'</div>'
    + '<div class="bs-dots">'+dotsHTML+'</div>'
    + '</div>'
    + '<div class="nav-bar">'
    + (i>0?'<button class="btn btn-back" onclick="go('+(i-1)+')">← Назад</button>':'')
    + (isLast
        ? '<button class="btn btn-main" onclick="go('+(i+1)+')">Продолжить&nbsp;→</button>'
        : '<button class="btn btn-main" onclick="bsNext()">Дальше&nbsp;→</button>')
    + '<button class="btn btn-toc" onclick="tocOpen()">☰</button>'
    + '</div>'
    + '</div>'
    + '</div>';
}

function buildBookshelf(i) {
  var found = S.booksFound.size;
  var pct   = Math.round(found/5*100);
  var done  = found === 5;

  function bookHTML(name) {
    var gi    = ALL_BOOKS.indexOf(name);
    var st    = 'background:'+BOOK_COLORS[gi]+';';
    var icon  = BOOK_ICONS[gi];
    var isFnd = S.booksFound.has(name);
    var star  = isFnd ? '<div style="position:absolute;top:4px;right:5px;font-size:12px;">✨</div>' : '';
    var cls   = 'book-cover'+(isFnd?' found':'');
    var click = isFnd ? '' : ' onclick="clickBook(\''+name+'\','+gi+')"';
    var idAttr = isFnd ? '' : ' id="bk'+gi+'"';
    return '<div class="'+cls+'"'+idAttr+' style="'+st+'"'+click+'>'
      + star
      + '<div class="book-icon">'+icon+'</div>'
      + '<div class="book-title">'+name+'</div>'
      + '</div>';
  }

  var row1 = ALL_BOOKS.slice(0,4).map(bookHTML).join('');
  var row2 = ALL_BOOKS.slice(4).map(bookHTML).join('');

  return '<div class="full-screen-wrap" style="background:linear-gradient(180deg,#f5ede0,#ede0cc);">'
    + '<div style="padding:16px 20px 6px;flex-shrink:0;">'
    + '<div class="game-intro">— Ты разве не знаешь, что на страницах любой книжки со сказками всегда остаётся немножечко волшебства? Найди для меня пять нужных книжек в твоём шкафу!</div>'
    + '<div class="magic-bar-wrap">'
    + '<div class="magic-bar-label"><span>✨ Волшебство</span><span>'+found+'&nbsp;из&nbsp;5</span></div>'
    + '<div class="magic-bar"><div class="magic-fill" style="width:'+pct+'%"></div></div>'
    + '</div>'
    + '<div class="book-feed" id="bkFeed">'+S.bookFeed+'</div>'
    + '</div>'
    + '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 20px 12px;min-height:0;">'
    + '<div class="shelf-cabinet">'
    + '<div class="shelf-plank">'+row1+'</div>'
    + '<div class="shelf-divider"></div>'
    + '<div class="shelf-plank">'+row2+'</div>'
    + '</div>'
    + '<div style="text-align:center;padding:8px 0 0;flex-shrink:0;">'
    + '<span style="font-size:13px;color:#a08060;font-family:Arial,sans-serif;font-style:italic;">'
    + (done ? '🌟&nbsp;Все пять волшебных книжек найдены!' : 'Нажимай на книжки — ищи волшебные!')
    + '</span>'
    + '</div>'
    + '</div>'
    + '<div class="nav-bar">'
    + '<button class="btn btn-back" onclick="go('+(i-1)+')">← Назад</button>'
    + '<button class="btn btn-main" onclick="go('+(i+1)+')" '+(done?'':'disabled')+'>Дальше&nbsp;→</button>'
    + '<button class="btn btn-toc" onclick="tocOpen()">☰</button>'
    + '</div>'
    + '</div>';
}

function buildMeal(i) {
  var ch  = S.meal;
  var res = ch==='toast'
    ? '«Ладно, сойдёт!» — буркнул Волшебник. Между его ладонями мелькнула маленькая искра.'
    : ch==='omelette'
    ? '«Вот это другое дело!» — обрадовался Волшебник. Его ладони ярко заискрились!'
    : '';
  return '<div class="full-screen-wrap">'
    + '<div class="scroll-area" style="padding-top:24px;display:flex;flex-direction:column;justify-content:center;">'
    + '<div class="story-text" style="margin-bottom:18px;">'
    + '<p>Волшебник потёр ладошкой об ладошку — между ними промелькнула искра!</p>'
    + '<p class="dialog">— Мне просто нужно поесть: чтобы творить волшебство, волшебник должен быть сытым!</p>'
    + '</div>'
    + '<div class="meal-q">Чем накормить Волшебника?</div>'
    + '<div class="meal-grid">'
    + '<div class="meal-card'+(ch==='toast'?' chosen':'')+'" onclick="pickMeal(\'toast\')">'
    + '<span class="meal-emoji">🍞</span>'
    + '<div class="meal-name">Тост с шоколадной пастой</div>'
    + '<div class="meal-hint">Быстро и вкусно</div>'
    + '</div>'
    + '<div class="meal-card'+(ch==='omelette'?' chosen':'')+'" onclick="pickMeal(\'omelette\')">'
    + '<span class="meal-emoji">🍳</span>'
    + '<div class="meal-name">Омлет, сосиска и чай</div>'
    + '<div class="meal-hint">Чуть дольше, но сытнее</div>'
    + '</div>'
    + '</div>'
    + '<div class="meal-result">'+res+'</div>'
    + '</div>'
    + '<div class="nav-bar">'
    + '<button class="btn btn-back" onclick="go('+(i-1)+')">← Назад</button>'
    + '<button class="btn btn-main" onclick="go('+(i+1)+')" '+(ch?'':'disabled')+'>Дальше&nbsp;→</button>'
    + '<button class="btn btn-toc" onclick="tocOpen()">☰</button>'
    + '</div>'
    + '</div>';
}

function buildPortal(i) {
  var omel = S.meal==='omelette';
  var txt  = omel
    ? '<p>Перекусив, Добрый Волшебник вытер рот рукавом и потёр ладони — они ярко заискрились!</p>'
      + '<p class="dialog">— Вот теперь я в полной силе! — воскликнул Волшебник. — Смогу перенести тебя прямо к домику тётушки Веды — она знает Волшебную страну как свои пять пальцев!</p>'
      + '<p class="dialog">— Держись крепче! Раз, два, три, волшебный портал, отворись!</p>'
    : '<p>Перекусив, Добрый Волшебник вытер рот рукавом и потёр ладони — они слабо засветились.</p>'
      + '<p class="dialog">— Ну, вот, уже лучше! Сил маловато, но для переноса хватит. Только учти: доставлю тебя лишь до стены, которой Пылевая ведьма обнесла Волшебную страну.</p>'
      + '<p class="dialog">— Держись крепче! Раз, два, три, волшебный портал, отворись!</p>';
  return '<div class="pane-wrap">'
    + illusPane(i)
    + '<div class="pane-text">'
    + '<div class="scroll-area"><div class="story-text"><div class="chapter-head">Глава&nbsp;I&nbsp;·&nbsp;Через портал!</div>'+txt+'</div></div>'
    + navBar(i)
    + '</div>'
    + '</div>';
}

function buildEnd() {
  var omel = S.meal==='omelette';
  var hint = omel
    ? 'Алёшка оказался у домика тётушки Веды. Что она ему расскажет?'
    : 'Алёшка оказался у высокой стены Волшебной страны. Как же через неё перебраться?';
  var stars = Array.from({length:28}, function(_,k) {
    var x  = Math.random()*100, y = Math.random()*100;
    var d  = (2+Math.random()*4).toFixed(1)+'s';
    var dl = (Math.random()*3).toFixed(1)+'s';
    return '<div class="end-star" style="left:'+x+'%;top:'+y+'%;--d:'+d+';--dl:'+dl+'"></div>';
  }).join('');
  return '<div class="end-body">'
    + '<div class="end-stars">'+stars+'</div>'
    + '<div class="end-icon">🌟</div>'
    + '<div class="end-title">Конец первой главы</div>'
    + '<div class="end-hint">'+hint+'</div>'
    + '<button class="btn-restart" onclick="restart()">Читать сначала</button>'
    + '</div>';
}

// ────────────────────────────────────────────
// ACTIONS
// ────────────────────────────────────────────
function go(i) {
  if (i<0 || i>=SCREENS.length) return;
  if (SCREENS[S.cur].type==='backstory' && SCREENS[i].type!=='backstory') S.bsSlide=0;
  S.prev = S.cur;
  S.cur  = i;
  S.visited.add(i);
  render();
  document.getElementById('screens').scrollTop = 0;
}

function bsNext() {
  var n = SCREENS[S.cur].slides.length;
  if (S.bsSlide < n-1) { S.bsSlide++; render(); }
}
function bsGo(i) { S.bsSlide=i; render(); }

function clickBook(name, gi) {
  if (S.booksFound.has(name)) return;
  if (MAGIC_BOOKS.indexOf(name) !== -1) {
    S.booksFound.add(name);
    S.bookFeed = S.booksFound.size===5
      ? '🌟 Все пять волшебных книжек найдены!'
      : '✨ «'+name+'» — волшебная! Нашёл!';
    render();
  } else {
    S.bookFeed = '«'+name+'» — нет, не та…';
    render();
    var el = document.getElementById('bk'+gi);
    if (el) { el.classList.add('wrong'); setTimeout(function(){ el.classList.remove('wrong'); },380); }
  }
}

function pickMeal(ch) { S.meal=ch; render(); }

function restart() {
  S.cur=0; S.prev=-1; S.visited=new Set([0]); S.bsSlide=0;
  S.booksFound=new Set(); S.bookFeed=''; S.meal=null;
  render();
}

function tocOpen() {
  document.getElementById('tocList').innerHTML = SCREENS.map(function(sc,i) {
    return '<div class="toc-row'+(i===S.cur?' cur':'')+'" onclick="go('+i+');tocClose()">'
      + '<div class="toc-num">'+(i+1)+'</div><div>'+sc.toc+'</div>'
      + '</div>';
  }).join('');
  document.getElementById('toc').classList.add('open');
}
function tocClose() { document.getElementById('toc').classList.remove('open'); }

// ────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────
render();
</script>
</body>
</html>
