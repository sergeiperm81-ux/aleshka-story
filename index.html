<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Возвращение Волшебной книги</title>
<style>
/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:      #1e1433;
  --gold:     #c9a227;
  --gold-lt:  #f0d060;
  --parchm:   #fdf8f0;
  --parchm2:  #f5ede0;
  --brown:    #2d1e0e;
  --brown2:   #7b4f2e;
  --magic:    #6b35c9;
  --magic2:   #9b6bef;
  --teal:     #1e8a7a;
  --shadow:   rgba(0,0,0,.18);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: #0d0a1e;
  font-family: Georgia, 'Times New Roman', serif;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 40%, #1a0a3e 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 60%, #0a1a40 0%, transparent 60%),
    #0d0a1e;
  z-index: -1;
}

/* ══════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════ */
#app {
  width: 100%;
  max-width: 960px;
  height: 100vh;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  background: var(--parchm);
  box-shadow: 0 0 80px rgba(100,60,200,.35);
  position: relative;
  overflow: hidden;
}

/* ── progress bar ── */
#topBar {
  background: var(--ink);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  flex-shrink: 0;
  z-index: 10;
}
.prog-label {
  color: rgba(201,162,39,.6);
  font-size: 12px;
  font-family: Arial, sans-serif;
  white-space: nowrap;
  min-width: 40px;
}
.prog-track {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,.12);
  border-radius: 2px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--magic), var(--gold));
  border-radius: 2px;
  transition: width .4s ease;
}
.prog-chaps {
  display: flex;
  gap: 3px;
  flex: 1;
}
.prog-dot {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,.12);
  transition: background .2s, transform .15s;
  cursor: pointer;
  position: relative;
}
.prog-dot:hover { background: rgba(255,255,255,.35); transform: scaleY(2.2); }
.prog-dot.vis  { background: rgba(201,162,39,.75); }
.prog-dot.vis:hover { background: rgba(201,162,39,1); }
.prog-dot.cur  { background: var(--gold); transform: scaleY(2.5); cursor: default; }
.prog-dot.cur:hover { transform: scaleY(2.5); }
.prog-dot.ch2  { background: rgba(30,138,122,.4); }
.prog-dot.ch2.vis { background: rgba(30,138,122,.8); }
.prog-dot.ch2.vis:hover { background: rgba(30,138,122,1); }
.prog-dot.ch2.cur { background: #2ed4c0; }

/* ── screens wrapper ── */
#screens {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.screen {
  display: none;
  position: absolute;
  inset: 0;
}
.screen.active {
  display: flex;
  flex-direction: column;
  animation: slideRight .32s ease-out both;
}
.screen.active.back {
  animation: slideLeft .32s ease-out both;
}

@keyframes slideRight {
  from { transform: translateX(100%); }
  to   { transform: translateX(0); }
}
@keyframes slideLeft {
  from { transform: translateX(-100%); }
  to   { transform: translateX(0); }
}

/* ── two-pane layout (desktop) ── */
.pane-wrap {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}
.pane-illus {
  width: 42%;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.pane-illus img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.illus-ph {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 13px;
  font-family: Arial, sans-serif;
  color: rgba(255,255,255,.55);
  text-align: center;
  padding: 20px;
}
.illus-ph .ph-icon { font-size: 36px; opacity: .6; }

.illus-scene {
  width: 100%; height: 100%;
  position: relative;
  overflow: hidden;
}
.scene-caption {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg, rgba(0,0,0,.55), transparent);
  color: rgba(255,255,255,.65);
  font-size: 11px;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 18px 12px 8px;
  pointer-events: none;
  letter-spacing: .5px;
}

.pane-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--parchm);
  border-left: 1px solid rgba(0,0,0,.07);
}
.scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 28px 28px 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--gold) transparent;
}
.scroll-area::-webkit-scrollbar { width: 5px; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

/* ── Story text ── */
.story-text {
  font-size: 20px;
  line-height: 1.9;
  color: var(--brown);
}
.story-text p { margin-bottom: 16px; }
.story-text p:last-child { margin-bottom: 0; }
.dialog { font-style: italic; color: var(--brown2); }

.chapter-head {
  font-size: 11px;
  font-family: Arial, sans-serif;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(107,53,201,.5);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.chapter-head.ch2 { color: rgba(30,138,122,.6); }
.chapter-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(107,53,201,.15);
}
.chapter-head.ch2::after { background: rgba(30,138,122,.2); }

/* ── fixed nav bar ── */
.nav-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: var(--parchm2);
  border-top: 1px solid rgba(0,0,0,.08);
  flex-shrink: 0;
}
.btn {
  border: none;
  border-radius: 26px;
  padding: 13px 22px;
  font-size: 16px;
  font-family: Georgia, serif;
  cursor: pointer;
  transition: transform .1s, box-shadow .2s, opacity .2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.btn:active { transform: scale(.95); }
.btn-main {
  background: var(--ink);
  color: var(--gold-lt);
  flex: 1;
  font-size: 17px;
  box-shadow: 0 3px 12px var(--shadow);
}
.btn-main:hover { box-shadow: 0 4px 18px rgba(107,53,201,.4); }
.btn-main.ch2 {
  background: #0e3d38;
  color: #7ffff4;
}
.btn-back {
  background: #e8dcc8;
  color: var(--brown);
}
.btn-toc {
  background: transparent;
  color: var(--ink);
  border: 2px solid var(--ink);
  padding: 11px 14px;
  font-size: 18px;
}
.btn:disabled { opacity: .3; pointer-events: none; }

/* ══════════════════════════════════════════
   COVER SCREEN
══════════════════════════════════════════ */
#sc0 {
  background: radial-gradient(ellipse 120% 100% at 30% 60%, #2a1060 0%, #0d0a1e 70%);
}
.cover-title {
  font-size: clamp(22px, 3.8vw, 32px);
  font-weight: bold;
  color: var(--gold-lt);
  line-height: 1.3;
  margin-bottom: 10px;
  text-shadow: 0 0 30px rgba(201,162,39,.5);
}
.cover-line {
  width: 80px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 14px auto;
}
.cover-sub {
  font-size: 14px;
  color: rgba(201,162,39,.5);
  margin-bottom: 36px;
  font-family: Arial, sans-serif;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.btn-start {
  background: linear-gradient(135deg, var(--gold) 0%, #e8b830 100%);
  color: var(--ink);
  border: none;
  border-radius: 32px;
  padding: 18px 52px;
  font-size: 20px;
  font-weight: bold;
  font-family: Georgia, serif;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(201,162,39,.45);
  transition: transform .15s, box-shadow .2s;
  letter-spacing: .5px;
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,162,39,.55); }
.btn-start:active { transform: scale(.97); }

/* ══════════════════════════════════════════
   BOOKSHELF GAME
══════════════════════════════════════════ */
.game-intro {
  font-size: 16px;
  font-style: italic;
  color: var(--brown2);
  line-height: 1.7;
  margin-bottom: 12px;
  padding: 12px 16px;
  background: rgba(107,53,201,.07);
  border-left: 3px solid var(--magic2);
  border-radius: 0 8px 8px 0;
}
.magic-bar-wrap { margin-bottom: 8px; }
.magic-bar-label {
  font-size: 13px;
  font-family: Arial, sans-serif;
  color: var(--brown);
  margin-bottom: 5px;
  display: flex;
  justify-content: space-between;
}
.magic-bar {
  height: 14px;
  background: #e8dcc8;
  border-radius: 7px;
  overflow: hidden;
}
.magic-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--magic), var(--gold));
  border-radius: 7px;
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
.magic-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 60%, rgba(255,255,255,.3) 80%, transparent 100%);
  animation: shimmer 1.5s ease-in-out infinite;
}
@keyframes shimmer {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(200%); }
}
.book-feed {
  min-height: 26px;
  text-align: center;
  font-size: 15px;
  font-style: italic;
  color: var(--brown2);
  margin: 5px 0 6px;
  font-family: Arial, sans-serif;
}
.shelf-cabinet {
  background: linear-gradient(180deg, #2a1205 0%, #4a2010 100%);
  border-radius: 12px;
  padding: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,.45), inset 0 2px 0 rgba(255,200,100,.05);
}
.shelf-plank {
  display: flex;
  gap: 10px;
  margin-bottom: 0;
  justify-content: center;
  align-items: flex-end;
}
.shelf-plank:last-child { margin-bottom: 0; }
.shelf-divider {
  height: 6px;
  background: linear-gradient(180deg, #8a4818, #5a2e0c);
  border-radius: 3px;
  margin: 2px 0 10px;
  box-shadow: 0 2px 4px rgba(0,0,0,.4);
}
.book-cover {
  width: 76px;
  height: 126px;
  flex-shrink: 0;
  border-radius: 2px 4px 4px 2px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 0 7px 12px 14px;
  text-align: center;
  user-select: none;
  transition: transform .22s cubic-bezier(.2,.8,.4,1), box-shadow .22s;
  box-shadow: 3px 6px 16px rgba(0,0,0,.7), inset -2px 0 6px rgba(0,0,0,.25);
  position: relative;
  overflow: hidden;
}
/* Корешок книги слева */
.book-cover::before {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 11px;
  background: linear-gradient(90deg, rgba(0,0,0,.45) 0%, rgba(0,0,0,.2) 100%);
  border-right: 1px solid rgba(255,255,255,.13);
}
/* Края страниц справа — имитация пачки листов */
.book-cover::after {
  content: '';
  position: absolute;
  top: 2px; right: 0; bottom: 2px;
  width: 6px;
  background: repeating-linear-gradient(
    180deg,
    rgba(255,255,255,.22) 0px,
    rgba(255,255,255,.22) 1px,
    rgba(210,185,150,.1) 1px,
    rgba(210,185,150,.1) 3px
  );
  border-left: 1px solid rgba(255,255,255,.1);
}
.book-cover:not(.found):hover {
  transform: translateY(-12px);
  box-shadow: 3px 20px 32px rgba(0,0,0,.85);
}
.book-cover.found {
  box-shadow: 0 0 0 2px var(--gold), 0 0 22px rgba(240,208,96,.6);
  cursor: default;
}
.book-cover.wrong { animation: shk .35s; }
@keyframes shk {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-5px) rotate(-2deg); }
  75%      { transform: translateX(5px) rotate(2deg); }
}
.book-star {
  position: absolute;
  top: 3px; right: 8px;
  font-size: 13px;
  z-index: 1;
}
.book-icon { font-size: 26px; margin-bottom: 7px; position: relative; z-index: 1; }
.book-title {
  font-size: 10.5px;
  color: rgba(255,255,255,.97);
  font-family: Arial, sans-serif;
  line-height: 1.25;
  font-weight: 700;
  word-break: break-word;
  text-shadow: 0 1px 4px rgba(0,0,0,.7);
  position: relative; z-index: 1;
  hyphens: auto;
}
/* Блик сверху — имитация освещения */
.book-shine {
  position: absolute;
  top: 0; left: 11px; right: 0;
  height: 38%;
  background: linear-gradient(180deg, rgba(255,255,255,.13) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}
/* Декоративная полоска-разделитель над названием */
.book-band {
  position: absolute;
  bottom: 34px; left: 11px; right: 6px;
  height: 1px;
  background: rgba(255,255,255,.18);
  z-index: 1;
}

/* ══════════════════════════════════════════
   TOOL SELECTION
══════════════════════════════════════════ */
/* ── Полка инструментов ── */
.tool-shelf {
  background: linear-gradient(180deg,#1c0c04 0%,#3a1808 100%);
  border-radius: 12px;
  padding: 14px 14px 4px;
  box-shadow: 0 6px 24px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,200,100,.07);
  margin-bottom: 14px;
}
.tool-shelf-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  align-items: flex-end;
}
.tool-shelf-plank {
  height: 8px;
  background: linear-gradient(180deg,#a05822 0%,#6a3210 100%);
  border-radius: 4px;
  margin: 3px 0 14px;
  box-shadow: 0 3px 8px rgba(0,0,0,.55);
}
.tool-card {
  width: 88px;
  flex-shrink: 0;
  border: none;
  border-radius: 10px 10px 3px 3px;
  padding: 14px 6px 11px;
  text-align: center;
  cursor: pointer;
  background: #f5ede0;
  transition: transform .2s cubic-bezier(.2,.8,.4,1), box-shadow .2s;
  box-shadow: 2px 4px 12px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.55);
  position: relative;
}
.tool-card:hover { transform: translateY(-11px); box-shadow: 2px 15px 26px rgba(0,0,0,.75); }
.tool-card.chosen-right { background:#e8f5ec; box-shadow:0 0 0 2px #2a7a40,0 0 22px rgba(42,122,64,.45); transform:translateY(-5px); }
.tool-card.chosen-wrong { background:#fff0f0; box-shadow:0 0 0 2px #c03030,0 4px 12px rgba(0,0,0,.3); }
.tool-emoji { font-size: 40px; display: block; margin-bottom: 8px; }
.tool-name { font-size: 11px; font-weight: 700; color: #3a2010; line-height: 1.3; }
.tool-hint { display: none; }
.tool-result {
  min-height: 26px;
  font-size: 15px;
  font-style: italic;
  color: var(--brown2);
  line-height: 1.6;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* ══════════════════════════════════════════
   LEAF GAME
══════════════════════════════════════════ */
.leaf-intro {
  font-size: 16px;
  font-style: italic;
  color: var(--brown2);
  line-height: 1.7;
  margin-bottom: 12px;
  padding: 12px 16px;
  background: rgba(30,138,122,.07);
  border-left: 3px solid var(--teal);
  border-radius: 0 8px 8px 0;
}
.leaf-bar-wrap { margin-bottom: 8px; }
.leaf-bar-label {
  font-size: 13px;
  font-family: Arial, sans-serif;
  color: var(--brown);
  margin-bottom: 5px;
  display: flex;
  justify-content: space-between;
}
.leaf-bar {
  height: 14px;
  background: #e8dcc8;
  border-radius: 7px;
  overflow: hidden;
}
.leaf-fill {
  height: 100%;
  background: linear-gradient(90deg, #2e8a50, #a0d060);
  border-radius: 7px;
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
}
.leaf-feed {
  min-height: 24px;
  text-align: center;
  font-size: 15px;
  font-style: italic;
  color: var(--brown2);
  margin: 5px 0 6px;
  font-family: Arial, sans-serif;
}
.leaf-pile {
  background: linear-gradient(180deg, #2a1a08 0%, #1a1208 100%);
  border-radius: 12px;
  padding: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,.4);
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.leaf-item {
  border-radius: 12px;
  cursor: pointer;
  padding: 10px 14px;
  text-align: center;
  user-select: none;
  transition: transform .2s, box-shadow .2s, opacity .3s;
  background: rgba(255,255,255,.06);
  border: 2px solid rgba(255,255,255,.1);
  font-size: 13px;
  font-family: Arial, sans-serif;
  color: rgba(255,255,255,.85);
  min-width: 80px;
}
.leaf-item:not(.picked):hover {
  transform: translateY(-4px) scale(1.06);
  box-shadow: 0 8px 18px rgba(0,0,0,.5);
}
.leaf-item.picked {
  box-shadow: 0 0 0 2px #a0d060, 0 0 16px rgba(160,208,96,.5);
  cursor: default;
  opacity: .6;
}
.leaf-item.picked::after { content: ' ✓'; color: #a0d060; }
.leaf-item .l-icon { font-size: 26px; display: block; margin-bottom: 4px; }
.leaf-item .l-name { font-size: 11px; opacity: .7; }

/* ══════════════════════════════════════════
   CHAPTER 2 COVER
══════════════════════════════════════════ */
.ch2-cover-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px 36px;
  background: radial-gradient(ellipse 120% 100% at 50% 60%, #0d3028 0%, #071820 70%);
}

/* ══════════════════════════════════════════
   END SCREENS
══════════════════════════════════════════ */
.end-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 36px 32px;
  background: linear-gradient(160deg, #1a0a3e 0%, #0d0a1e 100%);
  position: relative;
  overflow: hidden;
}
.end-body.ch2 { background: linear-gradient(160deg, #0a2820 0%, #071818 100%); }
.end-stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.end-star {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--gold-lt);
  border-radius: 50%;
  opacity: .5;
  animation: twinkle var(--d) ease-in-out infinite var(--dl);
}
.end-body.ch2 .end-star { background: #7ffff4; }
@keyframes twinkle {
  0%,100% { opacity: .15; }
  50%      { opacity: .7; }
}
.end-icon  { font-size: 58px; margin-bottom: 16px; filter: drop-shadow(0 0 20px var(--gold)); }
.end-body.ch2 .end-icon { filter: drop-shadow(0 0 20px #2ed4c0); }
.end-title { font-size: 26px; color: var(--gold-lt); font-weight: bold; margin-bottom: 12px; }
.end-body.ch2 .end-title { color: #7ffff4; }
.end-hint  { font-size: 17px; color: rgba(255,255,255,.75); line-height: 1.7; margin-bottom: 30px; max-width: 400px; }
.btn-restart {
  background: linear-gradient(135deg, var(--gold) 0%, #e8b830 100%);
  color: var(--ink);
  border: none;
  border-radius: 28px;
  padding: 16px 42px;
  font-size: 18px;
  font-weight: bold;
  font-family: Georgia, serif;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(201,162,39,.4);
}

/* ══════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════ */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
@keyframes floatSlow {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-6px) rotate(3deg); }
}
@keyframes pulse {
  0%,100% { transform: scale(1);   opacity: .7; }
  50%      { transform: scale(1.1); opacity: .3; }
}

/* ══════════════════════════════════════════
   MOBILE
══════════════════════════════════════════ */
@media (max-width: 639px) {
  .pane-illus { width: 100%; height: 200px; flex-shrink: 0; }
  .pane-wrap { flex-direction: column; }
  .scroll-area { padding: 18px 18px 10px; }
  .story-text { font-size: 18px; }
}

// ────────────────────────────────────────────
// RENDER
// ────────────────────────────────────────────
function render() {
  renderTop();
  renderScreens();
}

function renderTop() {
  var n = SCREENS.length;
  document.getElementById('progLabel').textContent = (S.cur+1)+'/'+n;
  document.getElementById('progDots').innerHTML = SCREENS.map(function(sc,i) {
    var c = 'prog-dot';
    if (sc.ch2) c += ' ch2';
    if (i === S.cur) c += ' cur';
    else if (S.visited.has(i)) c += ' vis';
    var label = sc.toc.replace(/^[⚡🔧🍁]\s*/, '');
    return '<div class="'+c+'" onclick="go('+i+')" title="'+label+'"></div>';
  }).join('');
}

function renderScreens() {
  var dir = S.cur > S.prev ? '' : ' back';
  document.getElementById('screens').innerHTML =
    SCREENS.map(function(sc, i) {
      var cls = 'screen' + (i===S.cur ? (' active'+dir) : '');
      return '<div class="'+cls+'" id="sc'+i+'">'+build(sc,i)+'</div>';
    }).join('');
}

// ── builders ────────────────────────────────
function build(sc, i) {
  switch(sc.type) {
    case 'cover':    return buildCover();
    case 'story':    return buildStory(sc,i);
    case 'bookshelf':return buildBookshelf(i);
    case 'tools':    return buildTools(i);
    case 'portal':   return buildPortal(i);
    case 'endch1':   return buildEndCh1();
    case 'leafgame': return buildLeafGame(i);
    case 'endch2':   return buildEndCh2();
  }
  return '';
}

function navBar(i, fwdDisabled, ch2) {
  var cls2 = ch2 ? ' ch2' : '';
  var back = i > 0
    ? '<button class="btn btn-back" onclick="go('+i+'-1)">← Назад</button>' : '';
  var fwd = i < SCREENS.length-1
    ? '<button class="btn btn-main'+cls2+'" onclick="go('+(i+1)+')" '+(fwdDisabled?'disabled':'')+'>Дальше&nbsp;→</button>' : '';
  return '<div class="nav-bar">'+back+fwd+'<button class="btn btn-toc" onclick="tocOpen()">☰</button></div>';
}

function buildCover() {
  return '<div class="pane-wrap" style="background:radial-gradient(ellipse at 30% 60%,#2a1060,#0d0a1e);">'
    + illusPane(null,1)
    + '<div class="pane-text" style="background:transparent;border-left:1px solid rgba(201,162,39,.18);">'
    + '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 36px;">'
    + '<div style="color:rgba(201,162,39,.45);font-size:11px;letter-spacing:3px;font-family:Arial,sans-serif;text-transform:uppercase;margin-bottom:22px;">✦ интерактивная сказка ✦</div>'
    + '<div class="cover-title">Возвращение<br>Волшебной книги</div>'
    + '<div class="cover-line"></div>'
    + '<div class="cover-sub">Главы 1 и 2</div>'
    + '<button class="btn-start" onclick="go(1)">Читать&nbsp;→</button>'
    + '<div style="margin-top:20px;color:rgba(201,162,39,.3);font-size:11px;font-family:Arial,sans-serif;letter-spacing:1px;">для детей 6–7 лет</div>'
    + '</div>'
    + '</div>'
    + '</div>';
}

function buildStory(sc, i) {
  var ch2 = sc.ch2;
  var headCls = 'chapter-head' + (ch2 ? ' ch2' : '');
  var tocLabel = sc.toc.replace(/^Глава\s+\S+\s*[·•]\s*/i, '');
  var label = ch2 ? 'Глава&nbsp;II&nbsp;·&nbsp;'+tocLabel : 'Глава&nbsp;I&nbsp;·&nbsp;'+sc.toc;
  var head = '<div class="'+headCls+'">'+label+'</div>';
  return '<div class="pane-wrap">'
    + illusPane(sc,i)
    + '<div class="pane-text">'
    + '<div class="scroll-area"><div class="story-text">'+head+sc.text+'</div></div>'
    + navBar(i, false, ch2)
    + '</div>'
    + '</div>';
}

function buildBookshelf(i) {
  var found = S.booksFound.size;
  var pct   = Math.round(found/5*100);
  var done  = found === 5;

  function bookHTML(name) {
    var gi    = ALL_BOOKS.indexOf(name);
    var base  = BOOK_COLORS[gi];
    var st    = 'background:'+base+';';
    var icon  = BOOK_ICONS[gi];
    var isFnd = S.booksFound.has(name);
    var star  = isFnd ? '<div class="book-star">✨</div>' : '';
    var cls   = 'book-cover'+(isFnd?' found':'');
    var click = isFnd ? '' : ' onclick="clickBook(\''+name+'\','+gi+')"';
    var idAttr = ' id="bk'+gi+'"';
    return '<div class="'+cls+'"'+idAttr+' style="'+st+'"'+click+'>'
      + star
      + '<div class="book-shine"></div>'
      + '<div class="book-band"></div>'
      + '<div class="book-icon">'+icon+'</div>'
      + '<div class="book-title">'+name+'</div>'
      + '</div>';
  }

  var row1 = ALL_BOOKS.slice(0,4).map(bookHTML).join('');
  var row2 = ALL_BOOKS.slice(4).map(bookHTML).join('');

  return '<div class="full-screen-wrap" style="background:linear-gradient(180deg,#f5ede0,#ede0cc);">'
    + '<div style="padding:16px 20px 6px;flex-shrink:0;">'
    + '<div class="game-intro">— Ты разве не знаешь, что на страницах любой книжки со сказками всегда остаётся немножечко волшебства? Найди для меня пять нужных книжек!</div>'
    + '<div class="magic-bar-wrap">'
    + '<div class="magic-bar-label"><span>✨ Волшебство</span><span id="bkCount">'+found+'&nbsp;из&nbsp;5</span></div>'
    + '<div class="magic-bar"><div class="magic-fill" id="bkFill" style="width:'+pct+'%"></div></div>'
    + '</div>'
    + '<div class="book-feed" id="bkFeed">'+S.bookFeed+'</div>'
    + '</div>'
    + '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 20px 12px;min-height:0;">'
    + '<div class="shelf-cabinet">'
    + '<div class="shelf-plank">'+row1+'</div>'
    + '<div class="shelf-divider"></div>'
    + '<div class="shelf-plank">'+row2+'</div>'
    + '</div>'
    + '<div style="text-align:center;padding:8px 0 0;flex-shrink:0;">'
    + '<span id="bkHint" style="font-size:13px;color:#a08060;font-family:Arial,sans-serif;font-style:italic;">'
    + (done ? '🌟&nbsp;Все пять волшебных книжек найдены!' : 'Нажимай на книжки — ищи волшебные!')
    + '</span>'
    + '</div>'
    + '</div>'
    + '<div class="nav-bar">'
    + '<button class="btn btn-back" onclick="go('+(i-1)+')">← Назад</button>'
    + '<button id="bkNextBtn" class="btn btn-main" onclick="go('+(i+1)+')" '+(done?'':'disabled')+'>Дальше&nbsp;→</button>'
    + '<button class="btn btn-toc" onclick="tocOpen()">☰</button>'
    + '</div>'
    + '</div>';
}

function buildTools(i) {
  var ch = S.toolChosen;
  var resText = '';
  if (ch === 'kit')  resText = '— Отлично! — воскликнул Волшебник. — Умный мальчишка! Именно этот набор и пригодится тебе в Волшебной стране!';
  else if (ch)       resText = '— Хм… — покачал головой Волшебник. — Подумай ещё раз! Тебе нужно то, что уже помогло тебе сегодня вечером…';

  function toolCard(t) {
    var cls = 'tool-card';
    if (ch === t.id) cls += t.correct ? ' chosen-right' : ' chosen-wrong';
    return '<div class="'+cls+'" id="tc-'+t.id+'" onclick="pickTool(\''+t.id+'\')">'
      + '<span class="tool-emoji">'+t.emoji+'</span>'
      + '<div class="tool-name">'+t.name+'</div>'
      + '</div>';
  }
  var row1 = TOOLS.slice(0,3).map(toolCard).join('');
  var row2 = TOOLS.slice(3).map(toolCard).join('');

  var done = ch === 'kit';

  return '<div class="full-screen-wrap">'
    + '<div class="scroll-area" style="padding-top:20px;">'
    + '<div class="story-text" style="margin-bottom:16px;">'
    + '<p>Волшебник потёр ладошкой об ладошку — между ними промелькнула искра.</p>'
    + '<p class="dialog">— Хорошо! А теперь перейдём к проверке! Выбери то, что поможет тебе в путешествии. Подсказка: сегодня это тебе уже помогло!</p>'
    + '</div>'
    + '<div style="font-size:12px;color:#a08060;font-family:Arial,sans-serif;text-align:center;margin-bottom:10px;font-style:italic;">Нажми на предмет, который нужен в дороге:</div>'
    + '<div class="tool-shelf">'
    + '<div class="tool-shelf-row">'+row1+'</div>'
    + '<div class="tool-shelf-plank"></div>'
    + '<div class="tool-shelf-row">'+row2+'</div>'
    + '<div class="tool-shelf-plank"></div>'
    + '</div>'
    + '<div id="toolResult" class="tool-result">'+resText+'</div>'
    + '</div>'
    + '<div class="nav-bar">'
    + '<button class="btn btn-back" onclick="go('+(i-1)+')">← Назад</button>'
    + '<button id="toolNextBtn" class="btn btn-main" onclick="go('+(i+1)+')" '+(done?'':'disabled')+'>Дальше&nbsp;→</button>'
    + '<button class="btn btn-toc" onclick="tocOpen()">☰</button>'
    + '</div>'
    + '</div>';
}

function buildPortal(i) {
  var txt = '<p>Добрый Волшебник потёр ладони — они ярко заискрились!</p>'
    + '<p class="dialog">— Ну, вот теперь мы готовы!</p>'
    + '<p class="dialog">— Постой! — заволновался Фил. — К чему готовы? Что я там делать-то буду в твоей Волшебной стране?</p>'
    + '<p class="dialog">— Всё просто! Находишь Волшебную книгу, спрашиваешь у неё, как выгнать Пыльную ведьму и вернуть меня, — а потом она открывается на нужной странице и говорит, что делать.</p>'
    + '<p class="dialog">— А если что-то пойдёт не так?</p>'
    + '<p class="dialog">— Хороший вопрос! — Волшебник хлопнул себя по лбу. — Ну, конечно! Вот, возьми.</p>'
    + '<p>Он протянул мальчишке малюсенькое зеркальце.</p>';
  return '<div class="pane-wrap">'
    + illusPane(null, i)
    + '<div class="pane-text">'
    + '<div class="scroll-area"><div class="story-text"><div class="chapter-head">Глава&nbsp;I&nbsp;·&nbsp;Через портал!</div>'+txt+'</div></div>'
    + navBar(i)
    + '</div>'
    + '</div>';
}

function buildEndCh1() {
  var stars = genEndStars(28, false);
  return '<div class="end-body">'
    + '<div class="end-stars">'+stars+'</div>'
    + '<div class="end-icon">🌟</div>'
    + '<div class="end-title">Конец первой главы</div>'
    + '<div class="end-hint">Фил шагнул в волшебный портал. Что ждёт его в Волшебной стране?</div>'
    + '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;">'
    + '<button class="btn-restart" style="font-size:1.15em;padding:14px 36px;" onclick="go('+(CH2)+')">Читать главу&nbsp;2&nbsp;→</button>'
    + '<button onclick="restart()" style="background:none;border:none;color:#8b6f47;font-size:0.9em;cursor:pointer;text-decoration:underline;padding:4px;">Начать сначала</button>'
    + '</div>'
    + '</div>';
}

function buildLeafGame(i) {
  var found = S.leavesFound.size;
  var pct   = Math.round(found/7*100);
  var done  = found === 7;

  var leavesHTML = ALL_LEAVES.map(function(l) {
    var isPicked = S.leavesFound.has(l.id);
    var cls = 'leaf-item' + (isPicked?' picked':'');
    var click = isPicked ? '' : ' onclick="clickLeaf(\''+l.id+'\','+l.maple+')"';
    return '<div class="'+cls+'"'+click+'>'
      + '<span class="l-icon">'+l.icon+'</span>'
      + '<span class="l-name">'+l.name+'</span>'
      + '</div>';
  }).join('');

  return '<div class="full-screen-wrap" style="background:linear-gradient(180deg,#f0ede0,#e0dcc8);">'
    + '<div style="padding:16px 20px 6px;flex-shrink:0;">'
    + '<div class="leaf-intro">— Тебе нужно найти семь кленовых листьев: Матушка Веда очень любит клёны, и в Волшебной стране они растут только возле её хижины!</div>'
    + '<div class="leaf-bar-wrap">'
    + '<div class="leaf-bar-label"><span>🍁 Кленовые листья</span><span id="lfCount">'+found+'&nbsp;из&nbsp;7</span></div>'
    + '<div class="leaf-bar"><div class="leaf-fill" id="lfFill" style="width:'+pct+'%"></div></div>'
    + '</div>'
    + '<div class="leaf-feed" id="lfFeed">'+S.leafFeed+'</div>'
    + '</div>'
    + '<div style="flex:1;overflow-y:auto;padding:0 20px 12px;">'
    + '<div class="leaf-pile">'+leavesHTML+'</div>'
    + '<div style="text-align:center;padding:10px 0 0;">'
    + '<span id="lfHint" style="font-size:13px;color:#7a6040;font-family:Arial,sans-serif;font-style:italic;">'
    + (done ? '🌟&nbsp;Все семь кленовых листьев собраны!' : 'Нажимай на листья — ищи кленовые!')
    + '</span>'
    + '</div>'
    + '</div>'
    + '<div class="nav-bar">'
    + '<button class="btn btn-back" onclick="go('+(i-1)+')">← Назад</button>'
    + '<button id="lfNextBtn" class="btn btn-main ch2" onclick="go('+(i+1)+')" '+(done?'':'disabled')+'>Дальше&nbsp;→</button>'
    + '<button class="btn btn-toc" onclick="tocOpen()">☰</button>'
    + '</div>'
    + '</div>';
}

function buildEndCh2() {
  var stars = genEndStars(28, true);
  return '<div class="end-body ch2">'
    + '<div class="end-stars">'+stars+'</div>'
    + '<div class="end-icon">🍁</div>'
    + '<div class="end-title">Конец второй главы</div>'
    + '<div class="end-hint">Ковёр поднял Фила на вершину стены — и мальчишка понял, что означает слово «спланируете». Что ждёт его впереди?</div>'
    + '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;">'
    + '<button class="btn-restart" style="font-size:1.1em;padding:14px 36px;background:linear-gradient(135deg,#2ed4c0,#1e8a7a);color:#fff;opacity:.55;cursor:default;letter-spacing:.03em;" disabled>Продолжение следует…</button>'
    + '<button onclick="restart()" style="background:none;border:none;color:#6ec8c0;font-size:0.9em;cursor:pointer;text-decoration:underline;padding:4px;">Читать сначала</button>'
    + '</div>'
    + '</div>';
}

function genEndStars(n, teal) {
  return Array.from({length:n}, function(_,k) {
    var x  = Math.random()*100, y = Math.random()*100;
    var d  = (2+Math.random()*4).toFixed(1)+'s';
    var dl = (Math.random()*3).toFixed(1)+'s';
    return '<div class="end-star" style="left:'+x+'%;top:'+y+'%;--d:'+d+';--dl:'+dl+'"></div>';
  }).join('');
}

// ────────────────────────────────────────────
// ACTIONS
// ────────────────────────────────────────────
function go(i) {
  if (i<0 || i>=SCREENS.length) return;
  S.prev = S.cur;
  S.cur  = i;
  S.visited.add(i);
  render();
  document.getElementById('screens').scrollTop = 0;
}

function clickBook(name, gi) {
  if (S.booksFound.has(name)) return;
  var el = document.getElementById('bk'+gi);
  if (MAGIC_BOOKS.indexOf(name) !== -1) {
    S.booksFound.add(name);
    var n = S.booksFound.size;
    var feedText = n===5 ? '🌟 Все пять волшебных книжек найдены!' : '✨ «'+name+'» — волшебная! Нашёл!';
    S.bookFeed = feedText;
    var feed = document.getElementById('bkFeed');
    if (feed) feed.textContent = feedText;
    var fill = document.getElementById('bkFill');
    if (fill) fill.style.width = Math.round(n/5*100)+'%';
    var cnt = document.getElementById('bkCount');
    if (cnt) cnt.innerHTML = n+'&nbsp;из&nbsp;5';
    var hint = document.getElementById('bkHint');
    if (hint) hint.innerHTML = n===5 ? '🌟&nbsp;Все пять волшебных книжек найдены!' : 'Нажимай на книжки — ищи волшебные!';
    if (el) {
      el.classList.add('found');
      el.removeAttribute('onclick');
      var star = document.createElement('div');
      star.className = 'book-star';
      star.textContent = '✨';
      el.insertBefore(star, el.firstChild);
    }
    if (n===5) {
      var btn = document.getElementById('bkNextBtn');
      if (btn) btn.removeAttribute('disabled');
    }
  } else {
    S.bookFeed = '«'+name+'» — нет, не та…';
    var feed = document.getElementById('bkFeed');
    if (feed) feed.textContent = S.bookFeed;
    if (el) { el.classList.add('wrong'); setTimeout(function(){ el.classList.remove('wrong'); },380); }
  }
}

function pickTool(id) {
  S.toolChosen = id;
  var correct = id === 'kit';
  // Update card styles without re-render
  TOOLS.forEach(function(t) {
    var el = document.getElementById('tc-'+t.id);
    if (!el) return;
    el.className = 'tool-card' + (id === t.id ? (t.correct ? ' chosen-right' : ' chosen-wrong') : '');
  });
  // Update result text
  var res = document.getElementById('toolResult');
  if (res) res.textContent = correct
    ? '— Отлично! — воскликнул Волшебник. — Умный мальчишка! Именно этот набор и пригодится тебе в Волшебной стране!'
    : '— Хм… — покачал головой Волшебник. — Подумай ещё раз! Тебе нужно то, что уже помогло тебе сегодня вечером…';
  // Enable next button
  if (correct) {
    var btn = document.getElementById('toolNextBtn');
    if (btn) btn.removeAttribute('disabled');
  }
}

function clickLeaf(id, maple) {
  if (S.leavesFound.has(id)) return;
  if (maple) {
    S.leavesFound.add(id);
    var n = S.leavesFound.size;
    var feedText = n===7 ? '🌟 Все семь кленовых листьев собраны!' : '🍁 Кленовый! Найден! ('+n+' из 7)';
    S.leafFeed = feedText;
    var feed = document.getElementById('lfFeed');
    if (feed) feed.textContent = feedText;
    var fill = document.getElementById('lfFill');
    if (fill) fill.style.width = Math.round(n/7*100)+'%';
    var cnt = document.getElementById('lfCount');
    if (cnt) cnt.innerHTML = n+'&nbsp;из&nbsp;7';
    var hint = document.getElementById('lfHint');
    if (hint) hint.innerHTML = n===7 ? '🌟&nbsp;Все семь кленовых листьев собраны!' : 'Нажимай на листья — ищи кленовые!';
    var el = document.getElementById(id);
    if (el) { el.classList.add('picked'); el.removeAttribute('onclick'); }
    if (n===7) {
      var btn = document.getElementById('lfNextBtn');
      if (btn) btn.removeAttribute('disabled');
    }
  } else {
    S.leafFeed = 'Нет, это не клён…';
    var feed = document.getElementById('lfFeed');
    if (feed) feed.textContent = S.leafFeed;
  }
}

function restart() {
  S.cur=0; S.prev=-1; S.visited=new Set([0]);
  S.booksFound=new Set(); S.bookFeed='';
  S.toolChosen=null;
  S.leavesFound=new Set(); S.leafFeed='';
  render();
}

function tocOpen() {
  var html = '';
  SCREENS.forEach(function(sc,i) {
    if (i === CH2) html += '<div class="toc-sep">Глава 2</div>';
    html += '<div class="toc-row'+(i===S.cur?' cur':'')+'" onclick="go('+i+');tocClose()">'
      + '<div class="toc-num">'+(i+1)+'</div><div>'+sc.toc+'</div>'
      + '</div>';
  });
  document.getElementById('tocList').innerHTML = html;
  document.getElementById('toc').classList.add('open');
}
function tocClose() { document.getElementById('toc').classList.remove('open'); }

// ────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────
render();
</script>
</body>
</html>
